name: Refresh Deal Prices

on:
  schedule:
    # Daily at 02:00 UTC (04:00 SAST). Adjust as you like.
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-deals
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh deal prices
        run: node scripts/update-deals.mjs

      - name: Commit and push if prices changed
        run: |
          if git diff --quiet content/deals.json; then
            echo "No price changes — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/deals.json
          git commit -m "chore(deals): auto-refresh prices"
          git push
